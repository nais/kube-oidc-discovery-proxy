{{- if and (.Capabilities.APIVersions.Has "networking.gke.io/v1alpha3") (gt (len .Values.upstreams) 0) }}
{{- $top := . }}
apiVersion: networking.gke.io/v1alpha3
kind: FQDNNetworkPolicy
metadata:
  name: {{ .Release.Name }}-upstreams
  labels:
    {{- include "kube-oidc-discovery-proxy.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
  egress:
  - to:
    - fqdns:
      {{- range .Values.upstreams }}
      - {{ . | quote }}
      {{- end }}
    ports:
    - protocol: TCP
      port: 443
{{- end }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-ingress
  labels:
    {{- include "kube-oidc-discovery-proxy.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "kube-oidc-discovery-proxy.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: nais-system
          podSelector:
            matchLabels:
              nais.io/ingressClass: {{ .Values.ingressClassName }}
      ports:
        - protocol: TCP
          port: http


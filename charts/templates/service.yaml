apiVersion: v1
kind: Service
metadata:
  name: {{ include "kube-oidc-discovery-proxy.fullname" . }}
  labels:
    {{- include "kube-oidc-discovery-proxy.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "kube-oidc-discovery-proxy.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP

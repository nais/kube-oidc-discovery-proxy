{{- $top := . -}}
{{- range .Values.upstreams }}
{{- $host := include "kube-oidc-discovery-proxy.ingressHost" (dict "upstream" . "domain" $top.Values.ingressDomain) }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ printf "%s-%s" (include "kube-oidc-discovery-proxy.fullname" $top) (include "kube-oidc-discovery-proxy.upstreamName" .) | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "kube-oidc-discovery-proxy.labels" $top | nindent 4 }}
spec:
  ingressClassName: {{ $top.Values.ingressClassName }}
  rules:
    - host: {{ $host | quote }}
      http:
        paths:
          - path: /.well-known/openid-configuration
            pathType: Exact
            backend:
              service:
                name: {{ include "kube-oidc-discovery-proxy.fullname" $top }}
                port:
                  name: http
          - path: /openid/v1/jwks
            pathType: Exact
            backend:
              service:
                name: {{ include "kube-oidc-discovery-proxy.fullname" $top }}
                port:
                  name: http
{{- end }}
